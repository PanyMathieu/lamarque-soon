<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison Lamarque Pany — Bientôt Disponible</title>
      <link rel="icon" type="image/png" href="favicon.png?v=1.0">
<link rel="apple-touch-icon" href="img/products/favicon.png?v=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300;400&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        :root {
            --black: #0a0a0a;
            --gold: #c9a96e;
            --gold-light: #e8d5b0;
            --white: #ffffff;
            --grey: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Jost', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            z-index: -1;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            animation: fadeIn 2s ease-out;
        }

        /* Style pour le logo */
        .logo-container {
            margin-bottom: 30px;
        }

        .main-logo {
            max-width: 150px; /* Ajuste la taille selon ton logo */
            height: auto;
            filter: brightness(1.1); /* Pour faire ressortir le logo sur fond noir */
        }

        .brand-ghost {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 12vw;
            color: rgba(255, 255, 255, 0.02);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
        }

        h1 {
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: var(--white);
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-style: italic;
            color: var(--gold);
            margin-bottom: 40px;
        }

        .status-box {
            border-top: 1px solid rgba(201, 169, 110, 0.2);
            padding-top: 30px;
        }

        p {
            font-size: 12px;
            letter-spacing: 0.1em;
            color: var(--grey);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--white);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .social-link:hover {
            opacity: 1;
        }

        .social-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .footer-year {
            position: absolute;
            bottom: 40px;
            font-size: 10px;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .tagline { font-size: 24px; }
            .main-logo { max-width: 120px; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="brand-ghost">L M Q</div>

    <div class="container">
        <div class="logo-container">
            <img src="logo-MLP.jpg" alt="Maison Lamarque Pany Logo" class="main-logo">
        </div>

        <h1>Maison Lamarque Pany</h1>
        <div class="tagline">L'élégance réinventée.</div>

        <div class="status-box">
            <p>Ouverture prévue bientôt...</p>

            <a href="https://www.instagram.com/Maison_Lamarque_Pany/" target="_blank" class="social-link">

                DÉCOUVRIR SUR INSTAGRAM
            </a>
        </div>
    </div>

    <div class="footer-year">© 2026 Québec, Canada</div>

</body>
</html>
